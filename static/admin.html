<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - 儿童积分系统</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root { --c1: #667eea; --c2: #764ba2; --bg: #f0f2f5; --card: #fff; --text: #333; --muted: #888; --danger: #e74c3c; --success: #27ae60; --warn: #f39c12; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }

  /* Auth screens */
  .auth-card { max-width: 400px; margin: 80px auto; background: var(--card); border-radius: 16px; padding: 40px 30px; box-shadow: 0 4px 20px rgba(0,0,0,.08); text-align: center; }
  .auth-card h1 { font-size: 24px; margin-bottom: 8px; }
  .auth-card p { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  .auth-card input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; margin-bottom: 12px; outline: none; transition: border .2s; }
  .auth-card input:focus { border-color: var(--c1); }
  .btn { display: inline-block; padding: 12px 24px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600; transition: all .2s; }
  .btn-primary { background: linear-gradient(135deg, var(--c1), var(--c2)); color: #fff; width: 100%; }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-warn { background: var(--warn); color: #fff; }
  .btn-outline { background: transparent; border: 2px solid var(--c1); color: var(--c1); }
  .error { color: var(--danger); font-size: 13px; margin-top: 8px; }

  /* Dashboard */
  .header { background: linear-gradient(135deg, var(--c1), var(--c2)); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; margin-bottom: 20px; }
  .header h1 { font-size: 20px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); border-radius: 12px; padding: 4px; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
  .tab { flex: 1; padding: 10px 16px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); transition: all .2s; border: none; background: transparent; }
  .tab.active { background: linear-gradient(135deg, var(--c1), var(--c2)); color: #fff; }

  /* Cards */
  .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
  .card h3 { font-size: 16px; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }

  /* Children list */
  .child-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; }
  .child-row .points { font-weight: 700; font-size: 18px; color: var(--c1); }

  /* Forms */
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .form-row label { font-weight: 600; font-size: 13px; min-width: 60px; }
  .form-row input, .form-row select { padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
  .form-row input:focus, .form-row select:focus { border-color: var(--c1); }

  /* Logs */
  .log-item { padding: 10px 14px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .log-item.undone { opacity: .4; text-decoration: line-through; }
  .log-item .meta { color: var(--muted); font-size: 12px; }

  /* Operations */
  .op-item { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .op-item.undone { opacity: .4; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-edit { background: #d5f5e3; color: #27ae60; }
  .tag-delete { background: #fadbd8; color: #e74c3c; }
  .tag-add { background: #d6eaf8; color: #2980b9; }
  .tag-task { background: #fdebd0; color: #e67e22; }
  .tag-reward { background: #e8daef; color: #8e44ad; }
  .tag-punish { background: #fadbd8; color: #c0392b; }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 10px; color: #fff; font-weight: 600; z-index: 1000; animation: slideIn .3s ease; }
  .toast-success { background: var(--success); }
  .toast-error { background: var(--danger); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>
<div x-data="adminApp()" x-cloak>
  <!-- ========== Phase 1: Setup ========== -->
  <div x-show="phase === 'setup'" class="auth-card">
    <h1>🔐 首次设置</h1>
    <p>设置管理员密码（至少4位）</p>
    <input type="password" placeholder="输入密码" x-model="password1">
    <input type="password" placeholder="确认密码" x-model="password2">
    <button class="btn btn-primary" @click="doSetup()">设置密码</button>
    <p class="error" x-text="error"></p>
  </div>

  <!-- ========== Phase 2: Login ========== -->
  <div x-show="phase === 'login'" class="auth-card">
    <template x-if="!showReset">
      <div>
        <h1>🔑 管理员登录</h1>
        <p>请输入管理密码</p>
        <input type="password" placeholder="输入密码" x-model="password1" @keydown.enter="doLogin()">
        <button class="btn btn-primary" @click="doLogin()">登录</button>
        <p class="error" x-text="error"></p>
        <p style="margin-top:12px"><a href="#" @click.prevent="showReset = true; error = ''" style="color:var(--muted);font-size:13px">重置密码</a></p>
      </div>
    </template>
    <template x-if="showReset">
      <div>
        <h1>🔄 重置密码</h1>
        <p>需验证旧密码</p>
        <input type="password" placeholder="旧密码" x-model="oldPassword">
        <input type="password" placeholder="新密码（至少4位）" x-model="password1">
        <input type="password" placeholder="确认新密码" x-model="password2">
        <button class="btn btn-primary" @click="doReset()">确认重置</button>
        <button class="btn btn-sm" style="margin-top:8px;background:#eee" @click="showReset = false; error = ''">← 返回登录</button>
        <p class="error" x-text="error"></p>
      </div>
    </template>
  </div>

  <!-- ========== Phase 3: Dashboard ========== -->
  <div x-show="phase === 'dashboard'" class="container">
    <div class="header">
      <h1>🛡️ Admin 管理面板</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" style="background:#fff;color:var(--c1)" @click="showChangePwd = true">修改密码</button>
        <button class="btn btn-sm btn-outline" style="color:#fff;border-color:#fff" @click="logout()">退出</button>
      </div>
    </div>

    <!-- Change password modal -->
    <div x-show="showChangePwd" class="auth-card" style="margin-bottom:20px">
      <h3>🔒 修改密码</h3>
      <input type="password" placeholder="新密码（至少4位）" x-model="newPassword1">
      <input type="password" placeholder="确认新密码" x-model="newPassword2">
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" @click="doChangePassword()">确认修改</button>
        <button class="btn btn-sm" style="background:#eee" @click="showChangePwd = false; error = ''">取消</button>
      </div>
      <p class="error" x-text="error"></p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab" :class="{ active: tab === 'overview' }" @click="tab = 'overview'">📋 总览</button>
      <button class="tab" :class="{ active: tab === 'points' }" @click="tab = 'points'">⭐ 积分修改</button>
      <button class="tab" :class="{ active: tab === 'logs' }" @click="tab = 'logs'">📝 日志管理</button>
      <button class="tab" :class="{ active: tab === 'history' }" @click="tab = 'history'; loadOperations()">🕐 操作历史</button>
      <button class="tab" :class="{ active: tab === 'loan' }" @click="tab = 'loan'; loadLoanSettings(); loadSimulatedTime()">💸 贷款设置</button>
    </div>

    <!-- ===== Tab: Overview ===== -->
    <div x-show="tab === 'overview'">
      <div class="card" x-show="groups.length > 0">
        <h3>
          群组列表
          <button class="btn btn-sm btn-danger" style="float:right"
                  x-show="selectedGroups.length > 0"
                  @click="doBatchDeleteGroups()">批量删除群组 (<span x-text="selectedGroups.length"></span>)</button>
        </h3>
        <div class="form-row">
          <label><input type="checkbox" @change="toggleAllGroups($event)" x-bind:checked="allGroupsSelected"> 全选</label>
        </div>
      </div>
      <template x-if="loading"><div class="loading">加载中...</div></template>
      <template x-if="!loading && groups.length === 0"><div class="empty">暂无群组数据</div></template>
      <template x-for="g in groups" :key="g.id">
        <div class="card">
          <h3>
            <input type="checkbox" :value="g.id" x-model="selectedGroups" style="margin-right:8px">
            <span x-text="'🏠 ' + g.name + ' (' + g.invite_code + ')'"></span>
            <button class="btn btn-sm btn-danger" style="float:right" @click="doDeleteGroup(g.id)">删除群组</button>
          </h3>
          <div x-show="g.children.length === 0" class="empty">该群组暂无孩子</div>
          <template x-for="c in g.children" :key="c.id">
            <div class="child-row">
              <span x-text="c.emoji + ' ' + c.name"></span>
              <div>
                <span class="points" x-text="c.total_points + ' 分'"></span>
                <button class="btn btn-sm btn-danger" style="margin-left:12px" @click="doDeleteChild(c.id)">删除</button>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- ===== Tab: Points ===== -->
    <div x-show="tab === 'points'">
      <div class="card">
        <h3>选择群组和孩子</h3>
        <div class="form-row">
          <label>群组</label>
          <select x-model="selectedGroupId" @change="onGroupChange()">
            <option value="">-- 选择群组 --</option>
            <template x-for="g in groups" :key="g.id">
              <option :value="g.id" x-text="g.name + ' (' + g.invite_code + ')'"></option>
            </template>
          </select>
          <label>孩子</label>
          <select x-model="selectedChildId">
            <option value="">-- 选择孩子 --</option>
            <template x-for="c in selectedChildren" :key="c.id">
              <option :value="c.id" x-text="c.emoji + ' ' + c.name + ' (' + c.total_points + '分)'"></option>
            </template>
          </select>
        </div>
        <div class="form-row" x-show="selectedChildId">
          <label>模式</label>
          <select x-model="pointsMode">
            <option value="set">设为指定值</option>
            <option value="delta">增减（正数增加，负数减少）</option>
          </select>
          <label>数值</label>
          <input type="number" x-model="pointsValue" style="width:120px" maxlength="6">
          <label>备注</label>
          <input type="text" x-model="pointsDesc" placeholder="可选" style="flex:1;min-width:150px">
          <button class="btn btn-sm btn-primary" @click="doModifyPoints()">确认修改</button>
        </div>
      </div>
    </div>

    <!-- ===== Tab: Logs ===== -->
    <div x-show="tab === 'logs'">
      <div class="card">
        <h3>选择群组</h3>
        <div class="form-row">
          <label>群组</label>
          <select x-model="logGroupId" @change="loadLogs()">
            <option value="">-- 选择群组 --</option>
            <template x-for="g in groups" :key="g.id">
              <option :value="g.id" x-text="g.name + ' (' + g.invite_code + ')'"></option>
            </template>
          </select>
        </div>
      </div>

      <!-- Add log form -->
      <div class="card" x-show="logGroupId">
        <h3>手动添加日志</h3>
        <div class="form-row">
          <label>孩子</label>
          <select x-model="newLog.child_id">
            <option value="">-- 选择 --</option>
            <template x-for="g in groups" :key="g.id">
              <template x-if="g.id == logGroupId">
                <template x-for="c in g.children" :key="c.id">
                  <option :value="c.id" x-text="c.emoji + ' ' + c.name"></option>
                </template>
              </template>
            </template>
          </select>
          <label>类型</label>
          <select x-model="newLog.action">
            <option value="earn">收入</option>
            <option value="spend">支出</option>
            <option value="punish">惩罚</option>
          </select>
          <label>金额</label>
          <input type="number" x-model="newLog.amount" style="width:100px" min="1">
          <label>描述</label>
          <input type="text" x-model="newLog.description" placeholder="日志描述" style="flex:1;min-width:150px">
          <button class="btn btn-sm btn-primary" @click="doAddLog()">添加</button>
        </div>
      </div>

      <!-- Log list -->
      <div class="card" x-show="logGroupId">
        <h3>
          日志列表
          <button class="btn btn-sm btn-danger" style="float:right"
                  x-show="selectedLogs.length > 0"
                  @click="doBatchDeleteLogs()">批量删除 (<span x-text="selectedLogs.length"></span>)</button>
        </h3>
        <div class="form-row" x-show="logs.length > 0">
          <label><input type="checkbox" @change="toggleAllLogs($event)" x-bind:checked="allLogsSelected"> 全选</label>
        </div>
        <template x-if="logs.length === 0"><div class="empty">暂无日志</div></template>
        <template x-for="l in logs" :key="l.id">
          <div class="log-item" :class="{ undone: l.undone }">
            <div>
              <input type="checkbox" :value="l.id" x-model="selectedLogs" :disabled="l.undone" style="margin-right:8px">
              <span x-text="l.description"></span>
              <span class="meta" x-text="' | ' + l.created_at"></span>
              <span x-show="l.undone" style="color:var(--danger);margin-left:8px">[已撤销]</span>
            </div>
            <button class="btn btn-sm btn-danger" x-show="!l.undone" @click="doDeleteLog(l.id)">删除</button>
          </div>
        </template>
      </div>
    </div>

    <!-- ===== Tab: History ===== -->
    <div x-show="tab === 'history'">
      <div class="card">
        <h3>选择群组查看操作历史</h3>
        <div class="form-row">
          <label>群组</label>
          <select x-model="opGroupId" @change="loadOperations()">
            <option value="">-- 选择群组 --</option>
            <template x-for="g in groups" :key="g.id">
              <option :value="g.id" x-text="g.name + ' (' + g.invite_code + ')'"></option>
            </template>
          </select>
        </div>
      </div>

      <div class="card" x-show="opGroupId && operations.length > 0">
        <h3>
          操作列表
          <button class="btn btn-sm btn-warn" style="float:right"
                  x-show="selectedOps.length > 0"
                  @click="doBatchUndo()">批量撤回 (<span x-text="selectedOps.length"></span>)</button>
        </h3>
        <div class="form-row">
          <label><input type="checkbox" @change="toggleAllOps($event)" x-bind:checked="allOpsSelected"> 全选</label>
        </div>
      </div>
      <template x-if="operations.length === 0 && opGroupId"><div class="empty">暂无操作记录</div></template>
      <template x-for="op in operations" :key="op.id">
        <div class="op-item" :class="{ undone: op.undone_at }">
          <div>
            <input type="checkbox" :value="op.id" x-model="selectedOps" :disabled="op.undone_at" style="margin-right:8px">
            <span :class="'tag tag-' + tagClass(op.operation_type)" x-text="opTypeLabel(op.operation_type)"></span>
            <span style="margin-left:8px" x-text="op.description"></span>
            <div class="meta" x-text="op.created_at"></div>
          </div>
          <button class="btn btn-sm btn-warn" x-show="!op.undone_at" @click="doUndo(op.id)">撤回</button>
        </div>
      </template>
    </div>

    <!-- Toast -->
    <div class="toast" :class="'toast-' + toastType" x-show="toast" x-text="toast" @click="toast = ''"></div>

    <!-- ===== Tab: Loan Settings ===== -->
    <div x-show="tab === 'loan'">
      <div class="card">
        <h3>💸 贷款参数设置</h3>
        <div class="form-row" style="margin-bottom:16px;">
          <label style="min-width:100px;">日利率 (%)</label>
          <input type="range" x-model.number="loanInterestRate" min="0" max="100" step="0.5" style="flex:1;">
          <span style="font-weight:700;min-width:60px;text-align:right;" x-text="loanInterestRate + '%'"></span>
        </div>
        <div class="form-row" style="margin-bottom:16px;">
          <label style="min-width:100px;">最高额度</label>
          <input type="range" x-model.number="loanMaxAmount" min="10" max="1000" step="10" style="flex:1;">
          <span style="font-weight:700;min-width:60px;text-align:right;" x-text="loanMaxAmount + ' 分'"></span>
        </div>
        <button class="btn btn-primary" @click="saveLoanSettings()">💾 保存设置</button>
      </div>

      <div class="card" :style="simulatedActive ? 'border: 2px solid #f59e0b; background: #fffbeb;' : ''">
        <h3>🕐 时间模拟（测试用）</h3>
        <p style="font-size:0.85rem;color:#6b7280;margin-bottom:12px;">
          设置后整个系统的时间将使用模拟值，方便测试利息累积和信用分变化。
          <template x-if="simulatedActive">
            <span style="color:#d97706;font-weight:600;">⚠ 当前处于模拟时间模式</span>
          </template>
        </p>
        <div class="form-row" style="margin-bottom:12px;">
          <input type="datetime-local" x-model="simulatedTime" step="1"
                 style="flex:1;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:0.95rem;">
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" @click="setSimulatedTime()">🕐 设为模拟时间</button>
          <button class="btn" @click="clearSimulatedTime()" style="background:#f3f4f6;">↩ 清除（恢复真实时间）</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function adminApp() {
  return {
    phase: 'setup',
    tab: 'overview',
    error: '',
    password1: '', password2: '',
    oldPassword: '',
    showReset: false,
    showChangePwd: false,
    newPassword1: '', newPassword2: '',
    token: '',
    groups: [],
    loading: false,

    // Points tab
    selectedGroupId: '',
    selectedChildId: '',
    selectedChildren: [],
    pointsMode: 'set',
    pointsValue: 0,
    pointsDesc: '',

    // Logs tab
    logGroupId: '',
    logs: [],
    selectedLogs: [],
    newLog: { child_id: '', action: 'earn', amount: 1, description: '' },

    // History tab
    opGroupId: '',
    operations: [],
    selectedOps: [],

    // Overview tab
    selectedGroups: [],

    // Loan settings
    loanInterestRate: 5,
    loanMaxAmount: 200,
    simulatedTime: '',
    simulatedActive: false,

    // Toast
    toast: '',
    toastType: 'success',

    // --- Computed ---
    get allLogsSelected() {
      const available = this.logs.filter(l => !l.undone);
      return available.length > 0 && available.every(l => this.selectedLogs.includes(l.id));
    },
    get allOpsSelected() {
      const available = this.operations.filter(o => !o.undone_at);
      return available.length > 0 && available.every(o => this.selectedOps.includes(o.id));
    },
    get allGroupsSelected() {
      return this.groups.length > 0 && this.groups.every(g => this.selectedGroups.includes(g.id));
    },

    async init() {
      const saved = localStorage.getItem('admin_token');
      if (saved) this.token = saved;
      const resp = await fetch('/api/admin/status');
      const data = await resp.json();
      if (!data.configured) {
        this.phase = 'setup';
      } else if (this.token) {
        await this.enterDashboard();
      } else {
        this.phase = 'login';
      }
    },

    async doSetup() {
      this.error = '';
      if (this.password1.length < 4) { this.error = '密码至少4位'; return; }
      if (this.password1 !== this.password2) { this.error = '两次密码不一致'; return; }
      const resp = await fetch('/api/admin/setup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: this.password1 }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        // 如果密码已设置，直接切到登录页
        if (resp.status === 400 && data.detail && data.detail.includes('已设置')) {
          this.phase = 'login';
          return;
        }
        this.error = data.detail || '设置失败'; return;
      }
      this.token = data.token;
      localStorage.setItem('admin_token', this.token);
      await this.enterDashboard();
    },

    async doLogin() {
      this.error = '';
      const resp = await fetch('/api/admin/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: this.password1 }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.error = data.detail || '登录失败'; return; }
      this.token = data.token;
      localStorage.setItem('admin_token', this.token);
      await this.enterDashboard();
    },

    async doReset() {
      this.error = '';
      if (!this.oldPassword) { this.error = '请输入旧密码'; return; }
      if (this.password1.length < 4) { this.error = '新密码至少4位'; return; }
      if (this.password1 !== this.password2) { this.error = '两次密码不一致'; return; }
      const resp = await fetch('/api/admin/reset', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ old_password: this.oldPassword }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.error = data.detail || '重置失败'; return; }
      // Now set the new password
      const setup = await fetch('/api/admin/setup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: this.password1 }),
      });
      const setupData = await setup.json();
      if (!setup.ok) { this.error = setupData.detail || '设置新密码失败'; return; }
      localStorage.removeItem('admin_token');
      this.token = setupData.token;
      localStorage.setItem('admin_token', this.token);
      this.password1 = '';
      this.password2 = '';
      this.oldPassword = '';
      this.showReset = false;
      await this.enterDashboard();
    },

    async doChangePassword() {
      this.error = '';
      if (this.newPassword1.length < 4) { this.error = '新密码至少4位'; return; }
      if (this.newPassword1 !== this.newPassword2) { this.error = '两次密码不一致'; return; }
      const resp = await fetch('/api/admin/change-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
        body: JSON.stringify({ new_password: this.newPassword1 }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.error = data.detail || '修改失败'; return; }
      this.showToast('密码已更新', 'success');
      this.showChangePwd = false;
      this.newPassword1 = '';
      this.newPassword2 = '';
      this.error = '';
    },

    async enterDashboard() {
      this.loading = true;
      const resp = await fetch('/api/admin/groups', {
        headers: { 'Authorization': 'Bearer ' + this.token },
      });
      if (resp.status === 401) {
        localStorage.removeItem('admin_token');
        this.token = '';
        this.phase = 'login';
        this.loading = false;
        return;
      }
      this.groups = await resp.json();
      this.loading = false;
      this.phase = 'dashboard';
    },

    logout() {
      localStorage.removeItem('admin_token');
      this.token = '';
      this.phase = 'login';
      this.password1 = '';
      this.showReset = false;
      this.showChangePwd = false;
    },

    // Points
    onGroupChange() {
      this.selectedChildId = '';
      const g = this.groups.find(x => x.id == this.selectedGroupId);
      this.selectedChildren = g ? g.children : [];
    },

    async doModifyPoints() {
      if (!this.selectedChildId) { this.showToast('请选择孩子', 'error'); return; }
      const resp = await fetch('/api/admin/points', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
        body: JSON.stringify({
          child_id: this.selectedChildId,
          group_id: this.selectedGroupId,
          mode: this.pointsMode,
          value: this.pointsValue,
          description: this.pointsDesc,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '修改失败', 'error'); return; }
      this.showToast('积分已更新: ' + data.previous_points + ' → ' + data.new_points, 'success');
      await this.enterDashboard(); // refresh
    },

    // Logs
    async loadLogs() {
      if (!this.logGroupId) return;
      const resp = await fetch('/api/logs?group_id=' + this.logGroupId + '&limit=200&offset=0', {
        headers: { 'X-Group-Code': this.groups.find(g => g.id == this.logGroupId)?.invite_code || '' },
      });
      const data = await resp.json();
      this.logs = data.logs || [];
    },

    async doAddLog() {
      if (!this.newLog.child_id || !this.newLog.amount || !this.newLog.description) {
        this.showToast('请填写完整信息', 'error'); return;
      }
      const resp = await fetch('/api/admin/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
        body: JSON.stringify({
          child_id: this.newLog.child_id,
          group_id: this.logGroupId,
          action: this.newLog.action,
          amount: this.newLog.amount,
          description: this.newLog.description,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '添加失败', 'error'); return; }
      this.showToast('日志已添加', 'success');
      this.newLog = { child_id: '', action: 'earn', amount: 1, description: '' };
      await Promise.all([this.loadLogs(), this.enterDashboard()]);
    },

    async doDeleteLog(logId) {
      if (!confirm('确认删除此日志？将逆转积分影响。')) return;
      const resp = await fetch('/api/admin/logs/' + logId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + this.token },
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '删除失败', 'error'); return; }
      this.showToast('日志已删除', 'success');
      await Promise.all([this.loadLogs(), this.enterDashboard()]);
    },

    // Operations
    async loadOperations() {
      if (!this.opGroupId) { this.operations = []; return; }
      const resp = await fetch('/api/admin/operations?group_id=' + this.opGroupId, {
        headers: { 'Authorization': 'Bearer ' + this.token },
      });
      this.operations = await resp.json();
    },

    async doUndo(opId) {
      if (!confirm('确认撤回此操作？')) return;
      const resp = await fetch('/api/admin/undo/' + opId, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + this.token },
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '撤回失败', 'error'); return; }
      this.showToast('操作已撤回', 'success');
      await Promise.all([this.loadOperations(), this.enterDashboard()]);
    },

    async doDeleteGroup(groupId) {
      if (!confirm('确认删除此群组及其所有数据（孩子、任务、奖励、流水）？此操作不可逆。')) return;
      const resp = await fetch('/api/admin/groups/' + groupId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + this.token },
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '删除失败', 'error'); return; }
      this.showToast('群组已删除', 'success');
      await this.enterDashboard();
    },

    async doDeleteChild(childId) {
      if (!confirm('确认删除此孩子及其流水记录？')) return;
      const resp = await fetch('/api/admin/children/' + childId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + this.token },
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '删除失败', 'error'); return; }
      this.showToast('孩子已删除', 'success');
      await this.enterDashboard();
    },

    // --- 多选 / 全选 ---

    toggleAllLogs(e) {
      if (e.target.checked) {
        this.selectedLogs = this.logs.filter(l => !l.undone).map(l => l.id);
      } else {
        this.selectedLogs = [];
      }
    },
    toggleAllOps(e) {
      if (e.target.checked) {
        this.selectedOps = this.operations.filter(o => !o.undone_at).map(o => o.id);
      } else {
        this.selectedOps = [];
      }
    },
    toggleAllGroups(e) {
      this.selectedGroups = e.target.checked ? this.groups.map(g => g.id) : [];
    },

    async doBatchDeleteLogs() {
      if (!confirm('确认删除选中的 ' + this.selectedLogs.length + ' 条日志？')) return;
      for (const id of this.selectedLogs) {
        await fetch('/api/admin/logs/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + this.token },
        });
      }
      this.showToast('已批量删除 ' + this.selectedLogs.length + ' 条日志', 'success');
      this.selectedLogs = [];
      await Promise.all([this.loadLogs(), this.enterDashboard()]);
    },

    async doBatchUndo() {
      if (!confirm('确认撤回选中的 ' + this.selectedOps.length + ' 个操作？')) return;
      for (const id of this.selectedOps) {
        await fetch('/api/admin/undo/' + id, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + this.token },
        });
      }
      this.showToast('已批量撤回 ' + this.selectedOps.length + ' 个操作', 'success');
      this.selectedOps = [];
      await Promise.all([this.loadOperations(), this.enterDashboard()]);
    },

    async doBatchDeleteGroups() {
      if (!confirm('确认删除选中的 ' + this.selectedGroups.length + ' 个群组及其所有数据？此操作不可逆！')) return;
      for (const id of this.selectedGroups) {
        await fetch('/api/admin/groups/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + this.token },
        });
      }
      this.showToast('已批量删除 ' + this.selectedGroups.length + ' 个群组', 'success');
      this.selectedGroups = [];
      await this.enterDashboard();
    },

    // Loan settings
    async loadLoanSettings() {
      try {
        const resp = await fetch('/api/admin/loan-settings', {
          headers: { 'Authorization': 'Bearer ' + this.token },
        });
        const data = await resp.json();
        this.loanInterestRate = data.interest_rate;
        this.loanMaxAmount = data.max_amount;
      } catch (e) { /* ignore */ }
    },

    async saveLoanSettings() {
      const resp = await fetch('/api/admin/loan-settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
        body: JSON.stringify({
          interest_rate: this.loanInterestRate,
          max_amount: this.loanMaxAmount,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '保存失败', 'error'); return; }
      this.showToast('贷款设置已保存', 'success');
    },

    async loadSimulatedTime() {
      try {
        const resp = await fetch('/api/admin/simulated-time', {
          headers: { 'Authorization': 'Bearer ' + this.token },
        });
        const data = await resp.json();
        this.simulatedActive = data.simulated;
        if (data.time) {
          // datetime-local expects "YYYY-MM-DDTHH:MM"
          this.simulatedTime = data.time.substring(0, 16);
        }
      } catch (e) { /* ignore */ }
    },

    async setSimulatedTime() {
      if (!this.simulatedTime) { this.showToast('请先选择时间', 'error'); return; }
      const resp = await fetch('/api/admin/simulated-time', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
        body: JSON.stringify({ time: this.simulatedTime }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '设置失败', 'error'); return; }
      this.simulatedActive = true;
      this.showToast(data.message, 'success');
    },

    async clearSimulatedTime() {
      const resp = await fetch('/api/admin/simulated-time', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
        body: JSON.stringify({ time: null }),
      });
      const data = await resp.json();
      if (!resp.ok) { this.showToast(data.detail || '清除失败', 'error'); return; }
      this.simulatedActive = false;
      this.simulatedTime = '';
      this.showToast(data.message, 'success');
    },

    // Helpers
    tagClass(type) {
      const m = { manual_edit: 'edit', manual_log_delete: 'delete', manual_log_add: 'add', task_complete: 'task', redeem_reward: 'reward', punish: 'punish', borrow_loan: 'add', repay_loan: 'spend' };
      return m[type] || 'edit';
    },
    opTypeLabel(type) {
      const m = { manual_edit: '修改积分', manual_log_delete: '积分变更(删)', manual_log_add: '积分变更(增)', task_complete: '完成任务', redeem_reward: '兑换奖励', punish: '惩罚', borrow_loan: '贷款借款', repay_loan: '贷款还款' };
      return m[type] || type;
    },
    showToast(msg, type) {
      this.toast = msg;
      this.toastType = type;
      setTimeout(() => this.toast = '', 3000);
    },
  };
}
</script>
</body>
</html>
